name: build

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [master]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2.2.2

      - name: Format files
        run: make dev fmt

      - name: Fail on differences
        run: git diff --exit-code

  tests:
    # Ubuntu latest no longer installs Python 3.9 by default so install it
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: 'temurin'   # Can also use 'zulu', 'adopt', etc.
          java-version: '17'

      - name: Get Java version
        run: java -version

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: "0.8.4"
          enable-cache: true

      - name: Run unit tests
        run: make dev test

      - name: Publish test coverage to coverage site
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: dbldatagen
          files: ./coverage.xml
