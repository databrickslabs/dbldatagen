name: build

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [master]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      v1: ${{ steps.check.outputs.v1 }}
      v0: ${{ steps.check.outputs.v0 }}
      shared: ${{ steps.check.outputs.shared }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi
          CHANGED=$(git diff --name-only "$BASE"..HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          v1=false
          v0=false
          shared=false

          echo "$CHANGED" | grep -qE '^dbldatagen/v1/|^tests/v1/' && v1=true
          echo "$CHANGED" | grep -qE '^dbldatagen/(?!v1/)' && v0=true
          echo "$CHANGED" | grep -qE '^tests/(?!v1/)' && v0=true
          echo "$CHANGED" | grep -qE '^pyproject\.toml$|^Makefile$|^\.github/workflows/' && shared=true

          echo "v1=$v1" >> "$GITHUB_OUTPUT"
          echo "v0=$v0" >> "$GITHUB_OUTPUT"
          echo "shared=$shared" >> "$GITHUB_OUTPUT"
          echo "Results: v1=$v1 v0=$v0 shared=$shared"

  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Format files
        run: make dev fmt

      - name: Fail on differences
        run: git diff --exit-code

  test-v0:
    needs: detect-changes
    if: needs.detect-changes.outputs.v0 == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          cache: 'pip'
          cache-dependency-path: '**/pyproject.toml'
          python-version: '3.10'

      - name: Install Hatch
        # click 8.3+ introduced bug for hatch; virtualenv 21 removed propose_interpreters
        run: pip install "hatch==1.13.0" "click<8.3" "virtualenv<21"

      - name: Run v0 unit tests
        run: hatch run v0:test-cov

      - name: Publish test coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: dbldatagen-v0
          files: ./coverage.xml

  test-v1:
    needs: detect-changes
    if: needs.detect-changes.outputs.v1 == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          cache: 'pip'
          cache-dependency-path: '**/pyproject.toml'
          python-version: '3.10'

      - name: Install Hatch
        run: pip install "hatch==1.13.0" "click<8.3" "virtualenv<21"

      - name: Run v1 unit tests
        run: hatch run v1:test-cov

      - name: Publish test coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: dbldatagen-v1
          files: ./coverage.xml

  # Gate job for branch protection — single status check that covers both test suites
  tests:
    needs: [fmt, test-v1, test-v0]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.fmt.result }}" == "failure" ]]; then
            echo "fmt failed"
            exit 1
          fi
          if [[ "${{ needs.test-v0.result }}" == "failure" ]]; then
            echo "test-v0 failed"
            exit 1
          fi
          if [[ "${{ needs.test-v1.result }}" == "failure" ]]; then
            echo "test-v1 failed"
            exit 1
          fi
          echo "All checks passed (or were skipped due to no changes)"
